services:
  api:
    build:
      context: .
    container_name: api
    ports:
      - 8000:8000
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    depends_on:
      # rabbitmq:
      #   condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
        - action: rebuild
          path: requirements.txt

  celery-worker:
    container_name: celeryworker
    build:
      context: .
    command: [ "celery", "-A", "app.tasks:c", "worker", "-l", "INFO" ]
    depends_on:
      # rabbitmq:
      #   condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    develop:
      watch:
        - action: sync+restart
          path: ./app/tasks.py
          target: /app
        - action: rebuild
          path: requirements.txt

  celery-beat:
    container_name: celerybeat
    build:
      context: .
    command: [ "celery", "-A", "app.tasks:c", "beat", "-l", "INFO" ]
    depends_on:
      # rabbitmq:
      #   condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_HOST=${RABBITMQ_HOST}
    develop:
      watch:
        - action: sync+restart
          path: ./app/tasks.py
          target: /app
        - action: rebuild
          path: requirements.txt

  # rabbitmq:
